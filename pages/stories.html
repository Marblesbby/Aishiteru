<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aishiteru · Stories</title>
  <script>
    (function(){
      var t = localStorage.getItem('aishiteru_theme');
      if (t) document.documentElement.setAttribute('data-pretheme', t);
    })();
  </script>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/stories.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

  <div class="app-shell">

    <!-- Mobile header -->
    <header class="app-header">
      <span class="logo">Aishiteru</span>
      <div class="hdr-right">
        <a href="/Aishiteru/pages/settings.html" class="hdr-icon" title="Settings">
          <i class="ti ti-settings" aria-hidden="true"></i>
        </a>
      </div>
    </header>

    <!-- Sidebar nav (desktop) / bottom nav (mobile) -->
    <nav class="bottom-nav">
      <a href="/Aishiteru/pages/stories.html" class="nav-item active">
        <i class="ti ti-books" aria-hidden="true"></i>
        <span>stories</span>
      </a>
      <a href="/Aishiteru/pages/shelf.html" class="nav-item">
        <i class="ti ti-library" aria-hidden="true"></i>
        <span>shelf</span>
      </a>
      <a href="/Aishiteru/pages/settings.html" class="nav-item">
        <i class="ti ti-settings" aria-hidden="true"></i>
        <span>settings</span>
      </a>
    </nav>

    <main class="page-content">

      <!-- Desktop page header -->
      <div class="desktop-header">
        <span class="desktop-header-title">Love Stories</span>
        <div class="desktop-header-actions">
          <button class="btn-primary" id="new-story-btn" style="width:auto; padding: 10px 18px;">
            <i class="ti ti-plus" aria-hidden="true"></i>
            New story
          </button>
        </div>
      </div>

      <!-- Mobile section header -->
      <div class="section-row mobile-only">
        <span class="section-lbl">✦ love stories</span>
        <button class="plus-btn" id="new-story-btn-mobile" title="Propose a new story">
          <i class="ti ti-plus" aria-hidden="true"></i>
        </button>
      </div>

      <div class="stories-list" id="active-stories">
        <div class="loading-state">Loading your stories...</div>
      </div>

      <div class="section-row" id="proposed-section-row" style="display:none;">
        <span class="section-lbl">💌 proposed</span>
      </div>

      <div class="stories-list" id="proposed-stories"></div>

    </main>

  </div>

  <script type="module" src="../js/pages/stories.js"></script>
</body>
</html>
