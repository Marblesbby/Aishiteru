<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aishiteru · Shelf</title>
  <script>
    (function(){
      var t = localStorage.getItem('aishiteru_theme');
      if (t) document.documentElement.setAttribute('data-pretheme', t);
    })();
  </script>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

  <div class="app-shell">

    <header class="app-header">
      <span class="logo">Aishiteru</span>
    </header>

    <nav class="bottom-nav">
      <a href="/Aishiteru/pages/stories.html" class="nav-item">
        <i class="ti ti-books" aria-hidden="true"></i>
        <span>stories</span>
      </a>
      <a href="/Aishiteru/pages/shelf.html" class="nav-item active">
        <i class="ti ti-library" aria-hidden="true"></i>
        <span>shelf</span>
      </a>
      <a href="/Aishiteru/pages/settings.html" class="nav-item">
        <i class="ti ti-settings" aria-hidden="true"></i>
        <span>settings</span>
      </a>
    </nav>

    <main class="page-content">
      <div class="desktop-header">
        <span class="desktop-header-title">Bookshelf</span>
      </div>
      <div class="empty-state" style="margin-top:40px;">
        📚<br><br>
        Your bookshelf is empty for now.<br>
        Finish a story to add it here.
      </div>
    </main>

  </div>

  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { applyTheme } from '../js/theme.js';
    await requireAuth();
    await applyTheme();
  </script>
</body>
</html>
